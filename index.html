<!DOCTYPE html>
<html>
<head>
  <title>GoalCast AI</title>
</head>
<body>

  <h2>Goal Prediction</h2>

  <input id="a_goals" placeholder="Team A Goals Avg"><br><br>
  <input id="b_goals" placeholder="Team B Goals Avg"><br><br>
  <input id="a_def" placeholder="Team A Defense Avg"><br><br>
  <input id="b_def" placeholder="Team B Defense Avg"><br><br>

  <button onclick="predict()">Predict</button>

  <h3 id="result"></h3>

  <script>
    function predict() {
      fetch("/api/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          a_goals: parseFloat(document.getElementById("a_goals").value),
          b_goals: parseFloat(document.getElementById("b_goals").value),
          a_def: parseFloat(document.getElementById("a_def").value),
          b_def: parseFloat(document.getElementById("b_def").value)
        })
      })
   .then(res => res.json())
.then(data => {
  document.getElementById("result").innerHTML = `
    🎯 Exact Score: ${data.exactScore} <br><br>
    📊 Team A Win: ${data.winA}% <br>
    🤝 Draw: ${data.draw}% <br>
    📊 Team B Win: ${data.winB}% <br><br>
    🔥 BTTS: ${data.btts}% <br>
    ⚽ Over 2.5: ${data.over25}%
  `;
})
.catch(error => {
  document.getElementById("result").innerHTML = "Error loading prediction";
});
